<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boa Universe</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff5f6d, #ffc371);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            animation: gradient 5s infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            width: 300px;
            height: 400px;
            margin: 20px;
            perspective: 1000px;
            transition: transform 0.5s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: rotateY(15deg);
        }

        .neon {
            text-shadow: 0 0 20px #ff5f6d, 0 0 30px #ff5f6d;
        }

        /* Add additional CSS for particle effects and micro-interactions here */
    </style>
</head>
<body>
    <div class="card">
        <h1 class="neon">Welcome to The Boa Universe</h1>
        <!-- Original functionalities (music player, encryption tool, visualizer, navigation) preserved here -->
    </div>
</body>
</html>
